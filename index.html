<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Inner Child Cards Inc.</title>
<link rel="manifest" href="manifest.json">
<style>
:root{--bg:#0d1220;--panel:#151d33;--panel2:#10182b;--text:#eef4ff;--muted:#9fb0ca;--gold:#e0b64b;--green:#45d483;--red:#ff6b6b;--line:#263550;--blue:#5da9ff}*{box-sizing:border-box}body{margin:0;background:linear-gradient(135deg,#080b13,#111b32);color:var(--text);font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif}.wrap{max-width:1180px;margin:auto;padding:22px}.top{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:18px}.brand h1{margin:0;font-size:30px;letter-spacing:.5px}.brand p{margin:4px 0 0;color:var(--muted)}button,.btn{background:var(--gold);color:#111;border:0;border-radius:10px;padding:10px 14px;font-weight:700;cursor:pointer;text-decoration:none;display:inline-block}button.secondary{background:#25314c;color:var(--text)}button.danger{background:#602a35;color:#fff}.nav{display:flex;gap:8px;flex-wrap:wrap;margin:12px 0 20px}.nav button{background:#1a2540;color:var(--text)}.nav button.active{background:var(--gold);color:#111}.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}.card{background:rgba(21,29,51,.92);border:1px solid var(--line);border-radius:16px;padding:16px;box-shadow:0 10px 30px rgba(0,0,0,.18)}.metric .label{color:var(--muted);font-size:13px}.metric .value{font-size:26px;font-weight:800;margin-top:4px}.green{color:var(--green)}.red{color:var(--red)}.gold{color:var(--gold)}table{width:100%;border-collapse:collapse;background:var(--panel);border-radius:14px;overflow:hidden}th,td{padding:10px;border-bottom:1px solid var(--line);font-size:14px;text-align:left}th{color:var(--gold);background:#10182b}tr:hover{background:#1a2540}.section{display:none}.section.active{display:block}.toolbar{display:flex;gap:8px;flex-wrap:wrap;margin:12px 0}.form{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:12px 0}.form input,.form select,.form textarea{width:100%;background:#0b1120;color:var(--text);border:1px solid var(--line);border-radius:10px;padding:10px}.form textarea{grid-column:1/-1;min-height:70px}.small{font-size:12px;color:var(--muted)}.pill{padding:4px 8px;border-radius:999px;background:#25314c;color:var(--text);font-size:12px}.two{display:grid;grid-template-columns:1fr 1fr;gap:12px}.goal{display:flex;justify-content:space-between;align-items:center;padding:10px;border-bottom:1px solid var(--line)}.progress{height:10px;background:#0b1120;border-radius:999px;overflow:hidden}.progress span{display:block;height:100%;background:var(--gold)}@media(max-width:850px){.grid,.two,.form{grid-template-columns:1fr}.top{align-items:flex-start;flex-direction:column}table{display:block;overflow-x:auto}.brand h1{font-size:24px}}</style>
</head>
<body>
<div class="wrap">
  <div class="top"><div class="brand"><h1>Inner Child Cards Inc.</h1><p>Pokémon Portfolio Manager · v4 Web App</p></div><div class="toolbar"><button onclick="exportData()">Export Backup</button><label class="btn">Import Backup<input type="file" id="importFile" accept="application/json" style="display:none" onchange="importData(event)"></label></div></div>
  <div class="nav"><button class="active" onclick="show('dashboard',this)">Dashboard</button><button onclick="show('cards',this)">Cards</button><button onclick="show('sealed',this)">Sealed</button><button onclick="show('watchlist',this)">Watchlist</button><button onclick="show('goals',this)">Goals</button><button onclick="show('settings',this)">Settings</button></div>

  <section id="dashboard" class="section active">
    <div class="grid" id="metrics"></div>
    <div class="two" style="margin-top:12px"><div class="card"><h3>Top Holdings</h3><div id="topHoldings"></div></div><div class="card"><h3>Allocation</h3><div id="allocation"></div></div></div>
  </section>

  <section id="cards" class="section"><div class="card"><h2>Card Vault</h2><div class="form" id="cardForm">
    <input id="cName" placeholder="Card name"><input id="cPokemon" placeholder="Pokémon"><input id="cSet" placeholder="Set">
    <input id="cNumber" placeholder="Card #"><select id="cGrade"><option>Raw/NM</option><option>PSA 10</option><option>PSA 9</option><option>Sealed Raw</option></select><input id="cQty" type="number" min="1" value="1" placeholder="Qty">
    <input id="cCost" type="number" step="0.01" placeholder="Total cost basis"><input id="cMarket" type="number" step="0.01" placeholder="Market value each"><select id="cCategory"><option>Core Blue Chip</option><option>Mega Evolution</option><option>Illustration Rare</option><option>Prismatic</option><option>Promo</option><option>Speculative</option></select>
    <textarea id="cNotes" placeholder="Investment thesis / notes"></textarea><button onclick="addCard()">Add Card</button><button class="secondary" onclick="clearCardsForm()">Clear</button>
  </div><div id="cardsTable"></div></div></section>

  <section id="sealed" class="section"><div class="card"><h2>Sealed Vault</h2><div class="form">
    <input id="sProduct" placeholder="Product"><input id="sSet" placeholder="Set"><select id="sType"><option>Booster Box</option><option>Elite Trainer Box</option><option>Booster Bundle</option><option>Case</option><option>Collection Box</option></select>
    <input id="sQty" type="number" min="1" value="1" placeholder="Qty"><input id="sCost" type="number" step="0.01" placeholder="Total cost basis"><input id="sMarket" type="number" step="0.01" placeholder="Market value each">
    <textarea id="sNotes" placeholder="Investment thesis / notes"></textarea><button onclick="addSealed()">Add Sealed Product</button>
  </div><div id="sealedTable"></div></div></section>

  <section id="watchlist" class="section"><div class="card"><h2>Watchlist</h2><div class="form"><input id="wItem" placeholder="Card/Product"><input id="wTarget" type="number" step="0.01" placeholder="Target price"><input id="wCurrent" type="number" step="0.01" placeholder="Current price"><select id="wPriority"><option>High</option><option>Medium</option><option>Low</option></select><textarea id="wNotes" placeholder="Notes"></textarea><button onclick="addWatch()">Add Watch Item</button></div><div id="watchTable"></div></div></section>

  <section id="goals" class="section"><div class="card"><h2>Goals & Achievements</h2><div id="goalsList"></div></div></section>
  <section id="settings" class="section"><div class="card"><h2>Settings</h2><div class="form"><input id="monthlyBudget" type="number" step="0.01" placeholder="Monthly budget"><input id="cash" type="number" step="0.01" placeholder="Cash available"><button onclick="saveSettings()">Save Settings</button><button class="danger" onclick="resetAll()">Reset All Data</button></div><p class="small">Data is saved in this browser using local storage. Use Export Backup regularly, especially before switching devices.</p></div></section>
</div>
<script>
const defaultData={settings:{monthlyBudget:2000,cash:0},cards:[
{name:'Mega Charizard X ex',pokemon:'Charizard',set:'Mega Evolutions',number:'',grade:'PSA 10',qty:1,cost:2150,market:2076.97,category:'Core Blue Chip',notes:'Foundational PSA 10 Charizard holding.'},
{name:'Charizard ex',pokemon:'Charizard',set:'Scarlet & Violet 151',number:'199/165',grade:'PSA 10',qty:1,cost:1700,market:1550,category:'Core Blue Chip',notes:'151 Charizard PSA 10.'},
{name:'Latias ex',pokemon:'Latias',set:'Surging Sparks',number:'239/191',grade:'PSA 10',qty:1,cost:700,market:600,category:'Core Blue Chip',notes:'Updated estimate closer to market discussed.'},
{name:'Umbreon ex',pokemon:'Umbreon',set:'Prismatic Evolutions',number:'',grade:'Raw/NM',qty:1,cost:900,market:900,category:'Prismatic',notes:'Core raw Umbreon.'},
{name:'Gengar',pokemon:'Gengar',set:'Prismatic Evolutions',number:'',grade:'Raw/NM',qty:1,cost:1225,market:1225,category:'Core Blue Chip',notes:'Premium raw Gengar.'}
],sealed:[
{product:'Mega Evolutions: Phantasmal Flames Booster Box',set:'Phantasmal Flames',type:'Booster Box',qty:1,cost:530,market:530,notes:'First sealed asset. Never open.'},
{product:'Prismatic Evolutions Elite Trainer Box',set:'Prismatic Evolutions',type:'Elite Trainer Box',qty:1,cost:180,market:180,notes:'Core sealed ETB. Never open.'}
],watch:[{item:'Mega Dragonite ex #290 PSA 10',target:1500,current:0,priority:'High',notes:'Buy only if under target and still wanted.'}],goals:[
{name:'First Booster Box',target:1,type:'sealed_booster'}, {name:'First ETB',target:1,type:'sealed_etb'}, {name:'10 PSA Cards',target:10,type:'psa'}, {name:'$25,000 Portfolio',target:25000,type:'value'}, {name:'$50,000 Portfolio',target:50000,type:'value'}, {name:'10 Booster Boxes',target:10,type:'sealed_booster'}]};
let data=JSON.parse(localStorage.getItem('iccData')||'null')||defaultData;function save(){localStorage.setItem('iccData',JSON.stringify(data));render()}function money(n){return '$'+(Number(n)||0).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2})}function pct(n){return (Number(n)||0).toFixed(1)+'%'}function totals(){let cardVal=data.cards.reduce((s,c)=>s+(+c.market||0)*(+c.qty||1),0),cardCost=data.cards.reduce((s,c)=>s+(+c.cost||0),0),sealedVal=data.sealed.reduce((s,c)=>s+(+c.market||0)*(+c.qty||1),0),sealedCost=data.sealed.reduce((s,c)=>s+(+c.cost||0),0);let value=cardVal+sealedVal,cost=cardCost+sealedCost,gain=value-cost;return{cardVal,cardCost,sealedVal,sealedCost,value,cost,gain,roi:cost?gain/cost*100:0}}function render(){renderDash();renderCards();renderSealed();renderWatch();renderGoals();document.getElementById('monthlyBudget').value=data.settings.monthlyBudget;document.getElementById('cash').value=data.settings.cash}function renderDash(){let t=totals();document.getElementById('metrics').innerHTML=[['Portfolio Value',money(t.value),'gold'],['Cost Basis',money(t.cost),''],['Gain/Loss',money(t.gain),t.gain>=0?'green':'red'],['ROI',pct(t.roi),t.roi>=0?'green':'red'],['Cash Available',money(data.settings.cash),''],['Monthly Budget',money(data.settings.monthlyBudget),''],['Cards Owned',data.cards.reduce((s,c)=>s+(+c.qty||1),0),''],['Sealed Items',data.sealed.reduce((s,c)=>s+(+c.qty||1),0),'']].map(m=>`<div class="card metric"><div class="label">${m[0]}</div><div class="value ${m[2]}">${m[1]}</div></div>`).join('');let holdings=[...data.cards.map(c=>({name:c.name,value:(+c.market||0)*(+c.qty||1),gain:(+c.market||0)*(+c.qty||1)-(+c.cost||0)})),...data.sealed.map(s=>({name:s.product,value:(+s.market||0)*(+s.qty||1),gain:(+s.market||0)*(+s.qty||1)-(+s.cost||0)}))].sort((a,b)=>b.value-a.value).slice(0,8);document.getElementById('topHoldings').innerHTML=holdings.map((h,i)=>`<div class="goal"><span>${i+1}. ${h.name}</span><b>${money(h.value)}</b></div>`).join('');let cats={Singles:t.cardVal,Sealed:t.sealedVal,Cash:+data.settings.cash||0};let all=t.value+cats.Cash;document.getElementById('allocation').innerHTML=Object.entries(cats).map(([k,v])=>`<div class="goal"><span>${k}</span><b>${money(v)} · ${all?pct(v/all*100):'0%'}</b></div><div class="progress"><span style="width:${all?v/all*100:0}%"></span></div>`).join('')}function renderCards(){document.getElementById('cardsTable').innerHTML='<table><tr><th>Name</th><th>Pokémon</th><th>Set</th><th>#</th><th>Grade</th><th>Qty</th><th>Cost</th><th>Market Each</th><th>Value</th><th>Gain/Loss</th><th>Category</th><th></th></tr>'+data.cards.map((c,i)=>{let v=(+c.market||0)*(+c.qty||1),g=v-(+c.cost||0);return`<tr><td>${c.name}</td><td>${c.pokemon||''}</td><td>${c.set||''}</td><td>${c.number||''}</td><td>${c.grade}</td><td>${c.qty}</td><td>${money(c.cost)}</td><td>${money(c.market)}</td><td>${money(v)}</td><td class="${g>=0?'green':'red'}">${money(g)}</td><td>${c.category}</td><td><button class="secondary" onclick="delCard(${i})">Delete</button></td></tr>`}).join('')+'</table>'}function renderSealed(){document.getElementById('sealedTable').innerHTML='<table><tr><th>Product</th><th>Set</th><th>Type</th><th>Qty</th><th>Cost</th><th>Market Each</th><th>Value</th><th>Gain/Loss</th><th>Rule</th><th></th></tr>'+data.sealed.map((s,i)=>{let v=(+s.market||0)*(+s.qty||1),g=v-(+s.cost||0);return`<tr><td>${s.product}</td><td>${s.set||''}</td><td>${s.type}</td><td>${s.qty}</td><td>${money(s.cost)}</td><td>${money(s.market)}</td><td>${money(v)}</td><td class="${g>=0?'green':'red'}">${money(g)}</td><td>🔒 Never Open</td><td><button class="secondary" onclick="delSealed(${i})">Delete</button></td></tr>`}).join('')+'</table>'}function renderWatch(){document.getElementById('watchTable').innerHTML='<table><tr><th>Item</th><th>Target</th><th>Current</th><th>Priority</th><th>Status</th><th></th></tr>'+data.watch.map((w,i)=>`<tr><td>${w.item}</td><td>${money(w.target)}</td><td>${money(w.current)}</td><td>${w.priority}</td><td>${(+w.current&&+w.current<=+w.target)?'🟢 At/Below Target':'Watching'}</td><td><button class="secondary" onclick="delWatch(${i})">Delete</button></td></tr>`).join('')+'</table>'}function goalProgress(g){let t=totals();if(g.type==='value')return Math.min(100,t.value/g.target*100);if(g.type==='psa')return Math.min(100,data.cards.filter(c=>String(c.grade).includes('PSA')).reduce((s,c)=>s+(+c.qty||1),0)/g.target*100);if(g.type==='sealed_booster')return Math.min(100,data.sealed.filter(s=>s.type==='Booster Box').reduce((a,s)=>a+(+s.qty||1),0)/g.target*100);if(g.type==='sealed_etb')return Math.min(100,data.sealed.filter(s=>s.type==='Elite Trainer Box').reduce((a,s)=>a+(+s.qty||1),0)/g.target*100);return 0}function renderGoals(){document.getElementById('goalsList').innerHTML=data.goals.map(g=>{let p=goalProgress(g);return`<div class="goal"><span>${p>=100?'✅':'⬜'} ${g.name}</span><b>${pct(p)}</b></div><div class="progress"><span style="width:${p}%"></span></div>`}).join('')}function show(id,btn){document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');document.querySelectorAll('.nav button').forEach(b=>b.classList.remove('active'));btn.classList.add('active')}function addCard(){data.cards.push({name:cName.value,pokemon:cPokemon.value,set:cSet.value,number:cNumber.value,grade:cGrade.value,qty:+cQty.value||1,cost:+cCost.value||0,market:+cMarket.value||0,category:cCategory.value,notes:cNotes.value});clearCardsForm();save()}function clearCardsForm(){['cName','cPokemon','cSet','cNumber','cCost','cMarket','cNotes'].forEach(id=>document.getElementById(id).value='');cQty.value=1}function addSealed(){data.sealed.push({product:sProduct.value,set:sSet.value,type:sType.value,qty:+sQty.value||1,cost:+sCost.value||0,market:+sMarket.value||0,notes:sNotes.value});['sProduct','sSet','sCost','sMarket','sNotes'].forEach(id=>document.getElementById(id).value='');sQty.value=1;save()}function addWatch(){data.watch.push({item:wItem.value,target:+wTarget.value||0,current:+wCurrent.value||0,priority:wPriority.value,notes:wNotes.value});['wItem','wTarget','wCurrent','wNotes'].forEach(id=>document.getElementById(id).value='');save()}function delCard(i){if(confirm('Delete card?')){data.cards.splice(i,1);save()}}function delSealed(i){if(confirm('Delete sealed product?')){data.sealed.splice(i,1);save()}}function delWatch(i){data.watch.splice(i,1);save()}function saveSettings(){data.settings.monthlyBudget=+monthlyBudget.value||0;data.settings.cash=+cash.value||0;save()}function exportData(){let blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});let a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='inner_child_cards_backup.json';a.click()}function importData(e){let f=e.target.files[0];if(!f)return;let r=new FileReader();r.onload=()=>{data=JSON.parse(r.result);save()};r.readAsText(f)}function resetAll(){if(confirm('Reset all app data?')){localStorage.removeItem('iccData');data=JSON.parse(JSON.stringify(defaultData));save()}}render();
if('serviceWorker'in navigator){navigator.serviceWorker.register('sw.js').catch(()=>{})}
</script>
</body></html>
